<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a1a2e">
<title>Scorecard</title>
<link rel="stylesheet" href="scorecard.css">
</head>
<body>
<div id="app">
  <header id="app-header">
    <div class="logo">SCORE<span>CARD</span></div>
    <button type="button" class="btn icon-btn" id="settings-btn" aria-label="Settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"></path>
      </svg>
    </button>
  </header>

  <div id="view-setup" class="view active">
    <div class="view-title">New game</div>

    <div class="name-list" id="name-list"></div>
    <button type="button" class="add-player-plus" id="setup-add-player" aria-label="Add player">+</button>
    <div class="setup-error" id="setup-error"></div>

    <div class="setup-actions">
      <button type="button" class="btn btn-primary btn-lg" id="confirm-btn">Confirm</button>
    </div>
  </div>

  <div id="view-game" class="view">
    <div class="game-scroll" id="game-scroll">
      <div class="game-toolbar" id="game-toolbar">
        <button type="button" class="btn btn-accent" id="add-round-btn">Add round</button>
        <button type="button" class="btn" id="change-players-btn">Change players</button>
        <button type="button" class="btn btn-primary" id="end-game-btn">End game</button>
      </div>
      <table class="score-grid" id="score-grid"></table>
      <div class="plus-strip">
        <button type="button" class="add-round-plus" id="add-round-plus" aria-label="Add round">+</button>
      </div>
    </div>
  </div>

  <div id="view-ended" class="view">
    <div class="view-title">Game over</div>
    <div class="ended-list" id="ended-list"></div>
    <div class="ended-actions">
      <button type="button" class="btn btn-accent btn-lg" id="restart-btn">Restart</button>
      <button type="button" class="btn btn-primary btn-lg" id="end-btn">End</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="players-modal" role="dialog" aria-modal="true" aria-labelledby="players-modal-title" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 id="players-modal-title">Change players</h2>
      <button type="button" class="btn btn-ghost" id="players-modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="name-list" id="modal-name-list"></div>
      <button type="button" class="add-player-plus" id="modal-add-player" aria-label="Add player">+</button>
      <div class="setup-error" id="modal-error"></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-primary btn-lg" id="players-modal-save">Save</button>
      <button type="button" class="btn btn-lg" id="players-modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="settings-modal" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 id="settings-modal-title">Settings</h2>
      <button type="button" class="btn btn-ghost" id="settings-modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body">
      <div class="setting-row">
        <div>
          <div class="setting-label">Appearance</div>
          <div class="setting-help">Light or dark color scheme</div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Color theme">
          <button type="button" id="theme-light-btn" data-theme-choice="light">Light</button>
          <button type="button" id="theme-dark-btn" data-theme-choice="dark">Dark</button>
        </div>
      </div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Round totals</div>
          <div class="setting-help">Show running total next to each score from round 2</div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Show round totals">
          <button type="button" id="round-totals-on">Show</button>
          <button type="button" id="round-totals-off">Hide</button>
        </div>
      </div>
      <div class="setting-row" id="setting-bold-leader">
        <div>
          <div class="setting-label">Bold round leader</div>
          <div class="setting-help">Bold the () for whoever leads after that round</div>
        </div>
        <div class="theme-toggle" role="group" aria-label="Bold round leader">
          <button type="button" id="bold-leader-on">On</button>
          <button type="button" id="bold-leader-off">Off</button>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-primary btn-lg" id="settings-modal-done">Done</button>
    </div>
  </div>
</div>

<script type="module">
import {
  MIN_PLAYERS,
  MAX_PLAYERS,
  normalizePlayerNames,
  columnTotals,
  cumulativeTotalsByRound,
  leaderIndices,
  applyPlayerEdit,
  emptyRound,
  restartGame,
  endGameFresh,
} from "./lib/scorecard-engine.js";

const STORAGE_KEY = "scorecard-v1";
const THEME_KEY = "scorecard-theme";
const PREFS_KEY = "scorecard-prefs";

const els = {
  setup: document.getElementById("view-setup"),
  game: document.getElementById("view-game"),
  ended: document.getElementById("view-ended"),
  nameList: document.getElementById("name-list"),
  setupError: document.getElementById("setup-error"),
  scoreGrid: document.getElementById("score-grid"),
  endedList: document.getElementById("ended-list"),
  modal: document.getElementById("players-modal"),
  modalNameList: document.getElementById("modal-name-list"),
  modalError: document.getElementById("modal-error"),
  settingsModal: document.getElementById("settings-modal"),
  themeLightBtn: document.getElementById("theme-light-btn"),
  themeDarkBtn: document.getElementById("theme-dark-btn"),
  themeMeta: document.querySelector('meta[name="theme-color"]'),
  roundTotalsOn: document.getElementById("round-totals-on"),
  roundTotalsOff: document.getElementById("round-totals-off"),
  boldLeaderOn: document.getElementById("bold-leader-on"),
  boldLeaderOff: document.getElementById("bold-leader-off"),
  boldLeaderRow: document.getElementById("setting-bold-leader"),
  appHeader: document.getElementById("app-header"),
  gameScroll: document.getElementById("game-scroll"),
  gameToolbar: document.getElementById("game-toolbar"),
  appRoot: document.getElementById("app"),
};

/** @type {{ view: string, players: string[], rounds: string[][] }} */
let state = {
  view: "setup",
  players: ["Player 1", "Player 2"],
  rounds: [],
};

/** @type {{ showRoundTotals: boolean, boldRoundLeader: boolean }} */
let prefs = {
  showRoundTotals: true,
  boldRoundLeader: true,
};

/** @type {{ name: string, fromIndex: number | null }[]} */
let draftPlayers = [];

let rowDeleteMode = false;
let lastRoundTap = { ri: -1, t: 0 };

function placeAppHeader(viewName) {
  if (!els.appHeader || !els.gameScroll || !els.appRoot) return;
  if (viewName === "game") {
    els.gameScroll.prepend(els.appHeader);
    els.appHeader.classList.add("in-game-scroll");
  } else if (els.appHeader.parentElement !== els.appRoot) {
    els.appRoot.insertBefore(els.appHeader, els.appRoot.firstChild);
    els.appHeader.classList.remove("in-game-scroll");
  }
}

function syncToolbarStickyOffset() {
  const h = els.gameToolbar?.offsetHeight || 52;
  document.documentElement.style.setProperty("--game-toolbar-height", `${h}px`);
}

function setRowDeleteMode(on) {
  rowDeleteMode = Boolean(on);
  if (!rowDeleteMode) lastRoundTap = { ri: -1, t: 0 };
  if (state.view === "game") renderGame();
}

function removeRoundAt(ri) {
  state.rounds.splice(ri, 1);
  if (!state.rounds.length) {
    state.rounds = [emptyRound(state.players.length)];
  }
  rowDeleteMode = false;
  lastRoundTap = { ri: -1, t: 0 };
  renderGame();
  save();
}

function onRoundLabelActivate(e, ri) {
  e.preventDefault();
  e.stopPropagation();
  if (rowDeleteMode) {
    removeRoundAt(ri);
    return;
  }
  const now = Date.now();
  if (lastRoundTap.ri === ri && now - lastRoundTap.t < 400) {
    lastRoundTap = { ri: -1, t: 0 };
    setRowDeleteMode(true);
  } else {
    lastRoundTap = { ri, t: now };
  }
}

function savePrefs() {
  try {
    localStorage.setItem(PREFS_KEY, JSON.stringify(prefs));
  } catch {
    /* ignore */
  }
}

function loadPrefs() {
  try {
    const raw = localStorage.getItem(PREFS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (typeof parsed?.showRoundTotals === "boolean") {
      prefs.showRoundTotals = parsed.showRoundTotals;
    }
    if (typeof parsed?.boldRoundLeader === "boolean") {
      prefs.boldRoundLeader = parsed.boldRoundLeader;
    }
  } catch {
    /* ignore */
  }
}

function syncPrefsUi() {
  els.roundTotalsOn.classList.toggle("active", prefs.showRoundTotals);
  els.roundTotalsOff.classList.toggle("active", !prefs.showRoundTotals);
  els.boldLeaderOn.classList.toggle("active", prefs.boldRoundLeader);
  els.boldLeaderOff.classList.toggle("active", !prefs.boldRoundLeader);
  els.boldLeaderRow.classList.toggle("is-disabled", !prefs.showRoundTotals);
  els.boldLeaderOn.disabled = !prefs.showRoundTotals;
  els.boldLeaderOff.disabled = !prefs.showRoundTotals;
}

function applyTheme(theme) {
  const next = theme === "light" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  els.themeLightBtn.classList.toggle("active", next === "light");
  els.themeDarkBtn.classList.toggle("active", next === "dark");
  if (els.themeMeta) {
    els.themeMeta.setAttribute(
      "content",
      next === "light" ? "#ffffff" : "#1a1a2e"
    );
  }
  try {
    localStorage.setItem(THEME_KEY, next);
  } catch {
    /* ignore */
  }
}

function loadTheme() {
  let theme = "dark";
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === "light" || saved === "dark") theme = saved;
  } catch {
    /* ignore */
  }
  applyTheme(theme);
}

function openSettingsModal() {
  syncPrefsUi();
  els.settingsModal.hidden = false;
  els.settingsModal.classList.add("open");
}

function closeSettingsModal() {
  els.settingsModal.classList.remove("open");
  els.settingsModal.hidden = true;
}

function save() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch {
    /* ignore quota */
  }
}

function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (!parsed || !Array.isArray(parsed.players)) return;
    state = {
      view: parsed.view === "game" || parsed.view === "ended" ? parsed.view : "setup",
      players: parsed.players.map((p) => String(p ?? "")),
      rounds: Array.isArray(parsed.rounds)
        ? parsed.rounds.map((row) =>
            Array.isArray(row) ? row.map((c) => String(c ?? "")) : []
          )
        : [],
    };
  } catch {
    /* ignore */
  }
}

function showView(name) {
  state.view = name;
  for (const [key, el] of Object.entries({
    setup: els.setup,
    game: els.game,
    ended: els.ended,
  })) {
    el.classList.toggle("active", key === name);
  }
  placeAppHeader(name);
  if (name === "game") {
    requestAnimationFrame(syncToolbarStickyOffset);
  }
  save();
}

function formatTotal(n) {
  if (Number.isInteger(n)) return String(n);
  return String(Math.round(n * 1000) / 1000);
}

/** Offset so (total) sits just right of the centered score digits.
 *  Blank scores are treated as "0" for positioning (value still not shown). */
function setScoreOffset(wrap, value) {
  const trimmed = String(value ?? "").trim();
  const len = trimmed.length === 0 ? 1 : trimmed.length;
  // Half the score width in em + gap between score and (total)
  const offsetEm = len * 0.32 + 0.55;
  wrap.style.setProperty("--score-offset", `${offsetEm}em`);
}

function defaultPlayerName(index) {
  return `Player ${index + 1}`;
}

function trashIconSvg() {
  const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("aria-hidden", "true");
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute(
    "d",
    "M4 7h16M9 7V5h6v2M10 11v6M14 11v6M6 7l1 12h10l1-12"
  );
  path.setAttribute("fill", "none");
  path.setAttribute("stroke", "currentColor");
  path.setAttribute("stroke-width", "2");
  path.setAttribute("stroke-linecap", "round");
  path.setAttribute("stroke-linejoin", "round");
  svg.appendChild(path);
  return svg;
}

/**
 * @param {object} opts
 * @param {HTMLElement} opts.listEl
 * @param {string[]} opts.names
 * @param {string} opts.idPrefix
 * @param {(index: number, value: string) => void} opts.onNameInput
 * @param {(index: number) => void} opts.onRemove
 * @param {(from: number, to: number) => void} opts.onReorder
 * @param {HTMLElement | null} [opts.errorEl]
 */
function renderPlayerNameRows({
  listEl,
  names,
  idPrefix,
  onNameInput,
  onRemove,
  onReorder,
  errorEl,
}) {
  listEl.innerHTML = "";
  names.forEach((name, i) => {
    const displayName = String(name ?? "").trim() || defaultPlayerName(i);
    const row = document.createElement("div");
    row.className = "name-row";
    row.dataset.draftIndex = String(i);

    const handle = document.createElement("button");
    handle.type = "button";
    handle.className = "drag-handle";
    handle.setAttribute("aria-label", `Drag to reorder player ${i + 1}`);
    handle.textContent = String(i + 1);
    handle.addEventListener("pointerdown", (e) => {
      if (e.button !== undefined && e.button !== 0) return;
      startPlayerDrag(e, i, row, listEl, onReorder);
    });

    const input = document.createElement("input");
    input.id = `${idPrefix}-${i}`;
    input.type = "text";
    input.autocomplete = "off";
    input.value = displayName;
    input.addEventListener("input", () => {
      onNameInput(i, input.value);
      if (errorEl) errorEl.textContent = "";
    });

    const remove = document.createElement("button");
    remove.type = "button";
    remove.className = "btn remove-btn";
    remove.setAttribute("aria-label", `Remove player ${i + 1}`);
    remove.appendChild(trashIconSvg());
    remove.disabled = names.length <= MIN_PLAYERS;
    remove.addEventListener("click", () => {
      if (names.length <= MIN_PLAYERS) return;
      onRemove(i);
    });

    row.append(handle, input, remove);
    listEl.appendChild(row);
  });
}

function renderSetup() {
  // Fill blanks with default names so Confirm can succeed without edits.
  state.players = state.players.map((name, i) =>
    String(name ?? "").trim() || defaultPlayerName(i)
  );
  while (state.players.length < MIN_PLAYERS) {
    state.players.push(defaultPlayerName(state.players.length));
  }
  if (state.players.length > MAX_PLAYERS) {
    state.players = state.players.slice(0, MAX_PLAYERS);
  }

  renderPlayerNameRows({
    listEl: els.nameList,
    names: state.players,
    idPrefix: "player-name",
    errorEl: els.setupError,
    onNameInput: (i, value) => {
      state.players[i] = value;
      save();
    },
    onRemove: (i) => {
      state.players.splice(i, 1);
      els.setupError.textContent = "";
      renderSetup();
      save();
    },
    onReorder: (from, to) => {
      const [item] = state.players.splice(from, 1);
      state.players.splice(to, 0, item);
      renderSetup();
      save();
    },
  });
  const setupAdd = document.getElementById("setup-add-player");
  if (setupAdd) setupAdd.disabled = state.players.length >= MAX_PLAYERS;
}

function renderGame() {
  const players = state.players;
  const rounds = state.rounds;
  const cumulative = cumulativeTotalsByRound(rounds, players.length);
  const totals = columnTotals(rounds, players.length);
  const overallLeaders = new Set(leaderIndices(totals));

  const thead = document.createElement("thead");
  const headRow = document.createElement("tr");
  const corner = document.createElement("th");
  corner.className = "round-label";
  corner.textContent = "#";
  headRow.appendChild(corner);
  players.forEach((name) => {
    const th = document.createElement("th");
    th.textContent = name;
    th.title = name;
    headRow.appendChild(th);
  });
  thead.appendChild(headRow);

  const tbody = document.createElement("tbody");
  rounds.forEach((row, ri) => {
    const tr = document.createElement("tr");
    tr.className = "score-row";
    tr.dataset.roundIndex = String(ri);
    const label = document.createElement("td");
    label.className = "round-label";
    if (rowDeleteMode) {
      label.classList.add("row-delete-btn");
      label.setAttribute("aria-label", `Delete round ${ri + 1}`);
      label.appendChild(trashIconSvg());
    } else {
      label.textContent = String(ri + 1);
      label.setAttribute("aria-label", `Round ${ri + 1}. Double tap to delete rounds`);
    }
    label.addEventListener("click", (e) => onRoundLabelActivate(e, ri));
    tr.appendChild(label);
    const roundTotals = cumulative[ri] || Array(players.length).fill(0);
    const roundLeaders = new Set(leaderIndices(roundTotals));
    for (let ci = 0; ci < players.length; ci++) {
      const td = document.createElement("td");
      td.className = "score-cell";
      td.dataset.playerIndex = String(ci);
      const wrap = document.createElement("div");
      wrap.className = "score-wrap";
      const input = document.createElement("input");
      input.type = "text";
      input.inputMode = "decimal";
      input.autocomplete = "off";
      input.value = row[ci] ?? "";
      input.setAttribute("aria-label", `${players[ci]} round ${ri + 1}`);
      input.addEventListener("focus", () => {
        input.select();
        wrap.classList.add("is-editing");
      });
      input.addEventListener("blur", () => {
        wrap.classList.remove("is-editing");
      });
      input.addEventListener("input", () => {
        if (!state.rounds[ri]) state.rounds[ri] = emptyRound(players.length);
        state.rounds[ri][ci] = input.value;
        setScoreOffset(wrap, input.value);
        updateDerivedScores();
        save();
      });
      input.addEventListener("change", () => {
        if (!state.rounds[ri]) state.rounds[ri] = emptyRound(players.length);
        state.rounds[ri][ci] = input.value;
        setScoreOffset(wrap, input.value);
        updateDerivedScores();
        save();
      });
      wrap.appendChild(input);
      if (ri > 0 && prefs.showRoundTotals) {
        setScoreOffset(wrap, row[ci] ?? "");
        const paren = document.createElement("span");
        paren.className = "run-paren";
        paren.textContent = `(${formatTotal(roundTotals[ci] ?? 0)})`;
        if (prefs.boldRoundLeader && roundLeaders.has(ci)) {
          paren.classList.add("is-leader");
        }
        wrap.appendChild(paren);
      }
      td.appendChild(wrap);
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  });

  const tfoot = document.createElement("tfoot");
  const footRow = document.createElement("tr");
  footRow.className = "totals-row";
  const totalLabel = document.createElement("td");
  totalLabel.className = "round-label";
  totalLabel.textContent = "Σ";
  footRow.appendChild(totalLabel);
  totals.forEach((t, i) => {
    const td = document.createElement("td");
    td.dataset.totalIndex = String(i);
    const badge = document.createElement("span");
    badge.className = "total-badge";
    badge.textContent = formatTotal(t);
    td.appendChild(badge);
    if (overallLeaders.has(i)) td.classList.add("is-leader");
    footRow.appendChild(td);
  });
  tfoot.appendChild(footRow);

  els.scoreGrid.replaceChildren(thead, tbody, tfoot);
  els.scoreGrid.classList.toggle("is-wide", players.length > 4);
  els.scoreGrid.classList.toggle("row-delete-mode", rowDeleteMode);
  els.scoreGrid.dataset.players = String(players.length);
  applyColumnWidths(players.length);
  syncToolbarStickyOffset();
}

function applyColumnWidths(playerCount) {
  const wrap = els.gameScroll;
  if (!wrap || !els.scoreGrid) return;
  if (playerCount <= 4) {
    els.scoreGrid.style.removeProperty("--player-col-width");
    return;
  }
  const roundCol = 28;
  const available = Math.max(wrap.clientWidth - roundCol, 200);
  const colW = Math.max(56, Math.floor(available / 4));
  els.scoreGrid.style.setProperty("--player-col-width", `${colW}px`);
}

function updateDerivedScores() {
  const players = state.players;
  const cumulative = cumulativeTotalsByRound(state.rounds, players.length);
  const totals = columnTotals(state.rounds, players.length);
  const overallLeaders = new Set(leaderIndices(totals));

  els.scoreGrid.querySelectorAll("tr.score-row").forEach((tr) => {
    const ri = Number(tr.dataset.roundIndex);
    if (ri < 1) return;
    const roundTotals = cumulative[ri] || Array(players.length).fill(0);
    const roundLeaders = new Set(leaderIndices(roundTotals));
    tr.querySelectorAll("td[data-player-index]").forEach((td) => {
      const ci = Number(td.dataset.playerIndex);
      const wrap = td.querySelector(".score-wrap");
      const input = td.querySelector("input");
      const paren = td.querySelector(".run-paren");
      if (!paren) return;
      if (wrap && input) setScoreOffset(wrap, input.value);
      paren.textContent = `(${formatTotal(roundTotals[ci] ?? 0)})`;
      paren.classList.toggle(
        "is-leader",
        prefs.boldRoundLeader && roundLeaders.has(ci)
      );
    });
  });

  els.scoreGrid.querySelectorAll("tfoot td[data-total-index]").forEach((td) => {
    const i = Number(td.dataset.totalIndex);
    const badge = td.querySelector(".total-badge");
    if (badge) badge.textContent = formatTotal(totals[i] ?? 0);
    else td.textContent = formatTotal(totals[i] ?? 0);
    td.classList.toggle("is-leader", overallLeaders.has(i));
  });
}

function renderEnded() {
  const totals = columnTotals(state.rounds, state.players.length);
  const leaders = new Set(leaderIndices(totals));
  const ranked = state.players
    .map((name, i) => ({ name, total: totals[i] ?? 0, i }))
    .sort((a, b) => b.total - a.total);

  els.endedList.innerHTML = "";
  ranked.forEach(({ name, total, i }) => {
    const row = document.createElement("div");
    row.className = "ended-row";
    if (leaders.has(i)) row.classList.add("is-leader");
    const n = document.createElement("span");
    n.className = "name";
    n.textContent = name;
    const t = document.createElement("span");
    t.className = "total";
    t.textContent = formatTotal(total);
    row.append(n, t);
    els.endedList.appendChild(row);
  });
}

function render() {
  if (state.view === "setup") {
    showView("setup");
    renderSetup();
  } else if (state.view === "game") {
    showView("game");
    renderGame();
  } else {
    showView("ended");
    renderEnded();
  }
}

function openPlayersModal() {
  draftPlayers = state.players.map((name, i) => ({
    name,
    fromIndex: i,
  }));
  els.modalError.textContent = "";
  renderModalPlayers();
  els.modal.hidden = false;
  els.modal.classList.add("open");
}

function closePlayersModal() {
  els.modal.classList.remove("open");
  els.modal.hidden = true;
}

function renderModalPlayers() {
  // Keep blank new slots filled with defaults for display/save.
  draftPlayers = draftPlayers.map((p, i) => ({
    ...p,
    name: String(p.name ?? "").trim() || defaultPlayerName(i),
  }));

  renderPlayerNameRows({
    listEl: els.modalNameList,
    names: draftPlayers.map((p) => p.name),
    idPrefix: "modal-player-name",
    errorEl: els.modalError,
    onNameInput: (i, value) => {
      draftPlayers[i].name = value;
    },
    onRemove: (i) => {
      draftPlayers.splice(i, 1);
      els.modalError.textContent = "";
      renderModalPlayers();
    },
    onReorder: (from, to) => {
      const [item] = draftPlayers.splice(from, 1);
      draftPlayers.splice(to, 0, item);
      renderModalPlayers();
    },
  });
  const modalAdd = document.getElementById("modal-add-player");
  if (modalAdd) modalAdd.disabled = draftPlayers.length >= MAX_PLAYERS;
}

/** @type {{ from: number, row: HTMLElement, hover: number, pointerId: number, listEl: HTMLElement, onReorder: (from: number, to: number) => void } | null} */
let playerDrag = null;

function clearDragOver(listEl) {
  listEl.querySelectorAll(".name-row").forEach((r) => {
    r.classList.remove("drag-over");
  });
}

function startPlayerDrag(e, fromIndex, row, listEl, onReorder) {
  e.preventDefault();
  playerDrag = {
    from: fromIndex,
    row,
    hover: fromIndex,
    pointerId: e.pointerId,
    listEl,
    onReorder,
  };
  row.classList.add("is-dragging");
  try {
    row.setPointerCapture(e.pointerId);
  } catch {
    /* ignore */
  }
  row.addEventListener("pointermove", onPlayerDragMove);
  row.addEventListener("pointerup", onPlayerDragEnd);
  row.addEventListener("pointercancel", onPlayerDragEnd);
}

function onPlayerDragMove(e) {
  if (!playerDrag) return;
  const rows = [...playerDrag.listEl.querySelectorAll(".name-row")];
  let hover = playerDrag.from;
  for (let i = 0; i < rows.length; i++) {
    const rect = rows[i].getBoundingClientRect();
    if (e.clientY >= rect.top && e.clientY <= rect.bottom) {
      hover = i;
      break;
    }
  }
  playerDrag.hover = hover;
  rows.forEach((r, i) => {
    r.classList.toggle("drag-over", i === hover && i !== playerDrag.from);
  });
}

function onPlayerDragEnd(e) {
  if (!playerDrag) return;
  const { from, hover, row, pointerId, listEl, onReorder } = playerDrag;
  row.removeEventListener("pointermove", onPlayerDragMove);
  row.removeEventListener("pointerup", onPlayerDragEnd);
  row.removeEventListener("pointercancel", onPlayerDragEnd);
  try {
    row.releasePointerCapture(pointerId);
  } catch {
    /* ignore */
  }
  row.classList.remove("is-dragging");
  clearDragOver(listEl);
  playerDrag = null;
  if (from !== hover) onReorder(from, hover);
}

document.getElementById("setup-add-player").addEventListener("click", () => {
  if (state.players.length >= MAX_PLAYERS) return;
  state.players.push(defaultPlayerName(state.players.length));
  els.setupError.textContent = "";
  renderSetup();
  save();
});

document.getElementById("confirm-btn").addEventListener("click", () => {
  const names = [...els.nameList.querySelectorAll("input")].map((el) => el.value);
  const result = normalizePlayerNames(names);
  if (!result.ok) {
    els.setupError.textContent = result.error;
    return;
  }
  state.players = result.names;
  state.rounds = [emptyRound(result.names.length)];
  els.setupError.textContent = "";
  showView("game");
  renderGame();
});

document.getElementById("add-round-btn").addEventListener("click", addRound);
document.getElementById("add-round-plus").addEventListener("click", addRound);

function addRound() {
  state.rounds.push(emptyRound(state.players.length));
  rowDeleteMode = false;
  renderGame();
  save();
  if (els.gameScroll) els.gameScroll.scrollTop = els.gameScroll.scrollHeight;
}

document.getElementById("change-players-btn").addEventListener("click", () => {
  openPlayersModal();
});

document.getElementById("settings-btn").addEventListener("click", openSettingsModal);
document.getElementById("settings-modal-close").addEventListener("click", closeSettingsModal);
document.getElementById("settings-modal-done").addEventListener("click", closeSettingsModal);
els.settingsModal.addEventListener("click", (e) => {
  if (e.target === els.settingsModal) closeSettingsModal();
});
els.themeLightBtn.addEventListener("click", () => applyTheme("light"));
els.themeDarkBtn.addEventListener("click", () => applyTheme("dark"));

els.roundTotalsOn.addEventListener("click", () => {
  prefs.showRoundTotals = true;
  savePrefs();
  syncPrefsUi();
  if (state.view === "game") renderGame();
});
els.roundTotalsOff.addEventListener("click", () => {
  prefs.showRoundTotals = false;
  savePrefs();
  syncPrefsUi();
  if (state.view === "game") renderGame();
});
els.boldLeaderOn.addEventListener("click", () => {
  if (!prefs.showRoundTotals) return;
  prefs.boldRoundLeader = true;
  savePrefs();
  syncPrefsUi();
  if (state.view === "game") renderGame();
});
els.boldLeaderOff.addEventListener("click", () => {
  if (!prefs.showRoundTotals) return;
  prefs.boldRoundLeader = false;
  savePrefs();
  syncPrefsUi();
  if (state.view === "game") renderGame();
});

document.getElementById("players-modal-close").addEventListener("click", closePlayersModal);
document.getElementById("players-modal-cancel").addEventListener("click", closePlayersModal);
els.modal.addEventListener("click", (e) => {
  if (e.target === els.modal) closePlayersModal();
});

document.getElementById("modal-add-player").addEventListener("click", () => {
  if (draftPlayers.length >= MAX_PLAYERS) return;
  draftPlayers.push({
    name: defaultPlayerName(draftPlayers.length),
    fromIndex: null,
  });
  els.modalError.textContent = "";
  renderModalPlayers();
});

document.getElementById("players-modal-save").addEventListener("click", () => {
  const names = draftPlayers.map((p) => p.name);
  const result = normalizePlayerNames(names);
  if (!result.ok) {
    els.modalError.textContent = result.error;
    return;
  }
  const next = draftPlayers.map((p, i) => ({
    name: result.names[i],
    fromIndex: p.fromIndex,
  }));
  const edited = applyPlayerEdit(state.rounds, next);
  state.players = edited.players;
  state.rounds = edited.rounds.length
    ? edited.rounds
    : [emptyRound(edited.players.length)];
  closePlayersModal();
  renderGame();
  save();
});

document.getElementById("end-game-btn").addEventListener("click", () => {
  showView("ended");
  renderEnded();
});

document.getElementById("restart-btn").addEventListener("click", () => {
  Object.assign(state, restartGame(state.players));
  showView("game");
  renderGame();
});

document.getElementById("end-btn").addEventListener("click", () => {
  Object.assign(state, endGameFresh());
  showView("setup");
  renderSetup();
});

loadPrefs();
loadTheme();
syncPrefsUi();
load();
if (state.view === "game" && (!state.rounds.length || !state.players.length)) {
  Object.assign(state, endGameFresh());
}
if (state.view === "ended" && !state.players.length) {
  Object.assign(state, endGameFresh());
}
render();

window.addEventListener("resize", () => {
  if (state.view === "game") {
    applyColumnWidths(state.players.length);
    syncToolbarStickyOffset();
  }
});

els.gameScroll?.addEventListener("click", (e) => {
  if (!rowDeleteMode) return;
  if (e.target.closest("tbody .round-label")) return;
  setRowDeleteMode(false);
});
</script>
</body>
</html>
